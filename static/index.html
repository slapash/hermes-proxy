<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Hermes Chat</title>
  <!-- marked.js v15.0.12 — update version + integrity hash together when upgrading -->
  <script
    src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js"
    integrity="sha384-948ahk4ZmxYVYOc+rxN1H2gM1EJ2Duhp7uHtZ4WSLkV4Vtx5MUqnV+l7u9B+jFv+"
    crossorigin="anonymous"
  ></script>
  <!-- DOMPurify v3.2.4 — update version + integrity hash together when upgrading -->
  <script
    src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"
    integrity="sha384-eEu5CTj3qGvu9PdJuS+YlkNi7d2XxQROAFYOr59zgObtlcux1ae1Il3u7jvdCSWu"
    crossorigin="anonymous"
  ></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --surface2: #222;
      --accent: #00ff88;
      --text: #e0e0e0;
      --muted: #666;
      --border: #2a2a2a;
      --user-bubble: #1e3a2a;
      --sidebar-w: 260px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Menlo', 'Monaco', 'Consolas', monospace; font-size: 14px; overflow: hidden; }

    /* ── Login overlay ── */
    #login-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    #login-overlay.hidden { display: none; }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 40px;
      width: 100%; max-width: 320px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .login-box h1 { color: var(--accent); font-size: 20px; letter-spacing: 1px; }
    .login-box input[type=password] {
      background: var(--bg); border: 1px solid var(--border); color: var(--text);
      padding: 10px 12px; border-radius: 4px; width: 100%; font-family: inherit; font-size: 16px;
      outline: none;
    }
    .login-box input[type=password]:focus { border-color: var(--accent); }
    .login-box button {
      background: var(--accent); color: #000; border: none; border-radius: 4px;
      padding: 10px; font-family: inherit; font-size: 14px; font-weight: bold;
      cursor: pointer; transition: opacity .15s;
    }
    .login-box button:hover { opacity: .85; }
    #login-error { color: #ff4466; font-size: 13px; min-height: 18px; }

    /* ── App layout ── */
    #app { display: flex; height: 100vh; height: 100dvh; overflow: hidden; }
    #app.hidden { display: none; }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    #new-session-btn {
      flex: 1;
      background: transparent; border: 1px solid var(--accent); color: var(--accent);
      padding: 7px 12px; border-radius: 4px; font-family: inherit; font-size: 13px;
      cursor: pointer; transition: background .15s, color .15s;
    }
    #new-session-btn:hover { background: var(--accent); color: #000; }
    #logout-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: 4px; padding: 7px 10px; cursor: pointer; font-size: 14px; line-height: 1;
      transition: border-color .15s, color .15s; flex-shrink: 0;
    }
    #logout-btn:hover { border-color: #ff4466; color: #ff4466; }
    #session-list {
      flex: 1; overflow-y: auto; padding: 8px 0;
    }
    #session-list::-webkit-scrollbar { width: 4px; }
    #session-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .session-item {
      padding: 10px 14px; cursor: pointer; border-left: 3px solid transparent;
      transition: background .1s, border-color .1s;
    }
    .session-item:hover { background: var(--surface2); }
    .session-item.active { background: var(--surface2); border-left-color: var(--accent); }
    .session-title { color: var(--text); font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .session-date { color: var(--muted); font-size: 11px; margin-top: 2px; }

    /* ── Main area ── */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* top bar (mobile hamburger) */
    #topbar {
      display: none;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 12px;
      align-items: center; gap: 10px;
    }
    #hamburger {
      background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; line-height: 1;
    }
    #topbar-title { color: var(--accent); font-size: 15px; font-weight: bold; }

    /* thread */
    #thread {
      flex: 1; overflow-y: auto; padding: 24px 16px;
      display: flex; flex-direction: column; gap: 16px;
    }
    #thread::-webkit-scrollbar { width: 6px; }
    #thread::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .msg { display: flex; flex-direction: column; max-width: 80%; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.assistant { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px; border-radius: 8px; line-height: 1.6;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: var(--user-bubble); border: 1px solid #2a5a3a;
      color: var(--text); white-space: pre-wrap;
    }
    .msg.assistant .bubble {
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
    }

    /* markdown inside assistant bubbles */
    .bubble h1, .bubble h2, .bubble h3 { margin: .6em 0 .3em; color: var(--accent); }
    .bubble p { margin: .4em 0; }
    .bubble ul, .bubble ol { margin: .4em 0 .4em 1.4em; }
    .bubble li { margin: .2em 0; }
    .bubble code {
      background: #111; border: 1px solid var(--border);
      padding: 1px 5px; border-radius: 3px; font-family: inherit; font-size: 13px;
    }
    .bubble pre {
      background: #111; border: 1px solid var(--border);
      padding: 12px; border-radius: 6px; overflow-x: auto; margin: .6em 0;
    }
    .bubble pre code { background: none; border: none; padding: 0; }
    .bubble blockquote {
      border-left: 3px solid var(--accent); padding-left: 10px;
      color: var(--muted); margin: .4em 0;
    }
    .bubble a { color: var(--accent); }
    .bubble table { border-collapse: collapse; width: 100%; margin: .6em 0; }
    .bubble th, .bubble td { border: 1px solid var(--border); padding: 6px 10px; }
    .bubble th { background: var(--surface2); }

    /* timestamp tooltip on hover */
    .bubble[data-ts] { position: relative; }
    .bubble[data-ts]:hover::after {
      content: attr(data-ts);
      position: absolute;
      bottom: calc(100% + 6px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      padding: 3px 8px;
      border-radius: 4px;
      pointer-events: none;
      z-index: 10;
    }
    .msg.user .bubble[data-ts]:hover::after { right: 0; }
    .msg.assistant .bubble[data-ts]:hover::after { left: 0; }

    /* session-lost banner */
    #session-lost-banner {
      display: none;
      background: #2a1a00;
      border-bottom: 1px solid #664400;
      color: #ffaa44;
      font-size: 13px;
      padding: 8px 16px;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    #session-lost-banner.visible { display: flex; }
    #session-lost-banner span { flex: 1; }
    #session-lost-dismiss {
      background: none; border: none; color: #ffaa44;
      font-size: 16px; cursor: pointer; line-height: 1; padding: 0 4px;
    }

    /* thinking indicator */
    #thinking {
      align-self: flex-start; color: var(--muted); font-size: 13px;
      padding: 6px 14px; animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: .4; } 50% { opacity: 1; } }

    /* input area */
    #input-area {
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      display: flex; gap: 8px; align-items: flex-end;
      background: var(--surface);
      flex-shrink: 0;
    }
    #msg-input {
      flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text);
      padding: 10px 12px; border-radius: 6px; font-family: inherit; font-size: 14px;
      resize: none; min-height: 42px; max-height: 200px; overflow-y: auto;
      outline: none; line-height: 1.5;
    }
    #msg-input:focus { border-color: var(--accent); }
    #send-btn {
      background: var(--accent); color: #000; border: none; border-radius: 6px;
      padding: 10px 18px; font-family: inherit; font-size: 14px; font-weight: bold;
      cursor: pointer; transition: opacity .15s; white-space: nowrap; flex-shrink: 0;
      height: 42px;
    }
    #send-btn:hover:not(:disabled) { opacity: .85; }
    #send-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* Mobile overlay sidebar */
    #sidebar-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 50;
      background: rgba(0,0,0,.6);
    }
    @media (max-width: 767px) {
      #sidebar {
        position: fixed; inset: 0 auto 0 0; z-index: 60;
        transform: translateX(-100%);
        transition: transform .25s ease;
        width: 280px;
      }
      #sidebar.open { transform: translateX(0); }
      #sidebar-overlay.open { display: block; }
      #topbar { display: flex; }
      .msg { max-width: 95%; }
      #thread { padding: 12px 10px; }
      #input-area { padding: 8px 10px; padding-bottom: max(8px, env(safe-area-inset-bottom)); }
      #msg-input { font-size: 16px; /* prevent iOS zoom on focus */ }
      .login-box { padding: 28px 20px; }
    }
  </style>
</head>
<body>

<!-- Login overlay -->
<div id="login-overlay">
  <div class="login-box">
    <h1>hermes-proxy</h1>
    <input type="password" id="pw-input" placeholder="Password"
      autocomplete="new-password"
      data-lpignore="true"
      data-1p-ignore="true"
      data-bwignore="true" />
    <button id="login-btn">Login</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- Main app -->
<div id="app" class="hidden">
  <!-- Mobile overlay background -->
  <div id="sidebar-overlay"></div>

  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-header">
      <button id="new-session-btn">+ New</button>
      <button id="logout-btn" title="Logout">⏻</button>
    </div>
    <div id="session-list"></div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="topbar">
      <button id="hamburger">&#9776;</button>
      <span id="topbar-title">hermes</span>
    </div>
    <div id="session-lost-banner">
      <span>Session mapping lost — server was restarted. Pick a session from the sidebar or start a new one.</span>
      <button id="session-lost-dismiss" title="Dismiss">&#10005;</button>
    </div>
    <div id="thread"></div>
    <div id="input-area">
      <textarea id="msg-input" placeholder="Message hermes…" rows="1"></textarea>
      <button id="send-btn">Send</button>
    </div>
  </div>
</div>

<script src="/static/app.js" defer></script>
</body>
</html>
